<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Mon Portefeuille</title>
<style>
:root{--blue:#1F4E79;--light:#EBF3FB;--border:#dde3ec}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:14px;color:#222;background:#f0f2f5;display:flex;flex-direction:column}
.hd{background:var(--blue);color:#fff;padding:env(safe-area-inset-top,0) 0 0;flex-shrink:0}
.hd-inner{padding:16px 16px 12px}
.hd h1{font-size:18px;font-weight:700;margin-bottom:2px}
.hd .sub{font-size:11px;opacity:.6;margin-bottom:12px}
.sbox{position:relative}
.sbox input{width:100%;padding:13px 16px 13px 46px;border:none;border-radius:13px;font-size:16px;color:#222;outline:none;background:#fff;-webkit-appearance:none}
.sbox input::placeholder{color:#bbb}
.sbox .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);pointer-events:none}
#loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#888}
.spinner{width:36px;height:36px;border:3px solid #ddd;border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#hint{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:32px 24px;text-align:center}
#hint p{font-size:16px;font-weight:700;color:#aaa}
#hint span{font-size:13px;color:#ccc;line-height:1.6}
#scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;display:none}
.rbar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px}
.rbar .rc{font-size:12px;color:#888}
.rbar .sb{font-size:12px;color:var(--blue);font-weight:700;background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;padding:4px 0}
.cards{padding:0 10px 40px;display:flex;flex-direction:column;gap:10px}
.cc{background:#fff;border-radius:13px;border:1px solid var(--border);cursor:pointer;overflow:hidden}
.cc:active{opacity:.8}
.cc-hd{padding:13px 14px;display:flex;align-items:center;gap:12px}
.av{width:44px;height:44px;border-radius:11px;background:var(--light);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--blue);flex-shrink:0}
.ci{flex:1;min-width:0}
.cn{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cs{font-size:11px;color:#999;margin-top:2px}
.cm{text-align:right;flex-shrink:0}
.mn{font-size:13px;font-weight:700;color:var(--blue);white-space:nowrap}
.mc{font-size:11px;color:#999;margin-top:2px}
.cc-ft{border-top:1px solid #f5f5f5;padding:7px 13px;display:flex;gap:6px;flex-wrap:wrap}
.pill{display:inline-block;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600}
#fiche{display:none;position:fixed;inset:0;background:#f0f2f5;z-index:200;flex-direction:column;overflow:hidden}
#fiche.open{display:flex}
.fhd{background:var(--blue);color:#fff;padding:env(safe-area-inset-top,0) 0 0;flex-shrink:0}
.fhd-inner{padding:14px 16px;display:flex;align-items:center;gap:12px}
.back{background:rgba(255,255,255,.2);border:none;color:#fff;width:38px;height:38px;border-radius:9px;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-appearance:none}
.fhi{flex:1;min-width:0}
.fhi h2{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fhi p{font-size:11px;opacity:.7;margin-top:2px}
#fscroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.fbody{padding:14px;max-width:640px;margin:0 auto;padding-bottom:calc(env(safe-area-inset-bottom,0)+24px)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sbox2{background:#fff;border-radius:10px;border:1px solid var(--border);padding:13px;text-align:center}
.sbox2 .n{font-size:20px;font-weight:700;color:var(--blue);line-height:1.1}
.sbox2 .l{font-size:10px;color:#999;margin-top:3px}
.dc{background:#fff;border-radius:12px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.dhd{background:var(--light);padding:10px 13px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.dn{font-size:15px;font-weight:700;color:var(--blue);flex-shrink:0}
.dl{font-size:13px;font-weight:700;color:var(--blue);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right}
.dbody{padding:12px 14px}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.tag{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.fi{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f5f5f5}
.fi:last-child{border-bottom:none}
.fk{font-size:12px;color:#999;flex-shrink:0}
.fv{font-size:13px;font-weight:700;color:#222;text-align:right;padding-left:8px}
.sb2{background:var(--blue);border-radius:10px;padding:16px;margin-top:10px;text-align:center}
.sl{font-size:10px;color:#90CAF9;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.sv{font-size:32px;font-weight:700;color:#fff;line-height:1}
.ss{font-size:11px;color:#90CAF9;margin-top:5px}
.cbtn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;margin-top:10px;padding:14px;background:#fff;border:2px solid var(--blue);border-radius:10px;color:var(--blue);font-size:14px;font-weight:700;cursor:pointer;-webkit-appearance:none}
.cbtn:active{background:var(--light)}
.empty{padding:48px 20px;text-align:center;color:#bbb}
.empty p{font-size:15px;font-weight:700;margin-bottom:6px}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0)+16px);left:50%;transform:translateX(-50%);background:#1b5e20;color:#fff;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
@media(min-width:600px){.cards{display:grid;grid-template-columns:repeat(2,1fr);padding:0 16px 40px}}
@media(min-width:960px){.cards{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="hd"><div class="hd-inner">
  <h1>🏠 Mon Portefeuille</h1>
  <div class="sub" id="sub">Chargement...</div>
  <div class="sbox">
    <svg class="si" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="q" type="search" placeholder="Nom de société ou SIREN…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="search" oninput="onSearch()" onkeyup="onSearch()">
  </div>
</div></div>
<div id="loading"><div class="spinner"></div><span>Chargement des données…</span></div>
<div id="hint">
  <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="1.3"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <p>Recherchez un client</p>
  <span>Tapez le nom de la société<br>ou le numéro SIREN</span>
</div>
<div id="scroll">
  <div class="rbar">
    <span class="rc" id="rc"></span>
    <button class="sb" onclick="toggleSort()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
      <span id="sl">Mnt ↓</span>
    </button>
  </div>
  <div class="cards" id="cards"></div>
</div>
<div id="fiche">
  <div class="fhd"><div class="fhd-inner">
    <button class="back" onclick="closeFiche()">←</button>
    <div class="fhi"><h2 id="ft"></h2><p id="fs"></p></div>
  </div></div>
  <div id="fscroll"><div class="fbody" id="fb"></div></div>
</div>
<div class="toast" id="toast"></div>

let DATA=[],sortAsc=false,lastQ='';
const f2=n=>(+n).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2});
const ini=s=>(s||'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]||'').join('').toUpperCase().substring(0,2)||'?';
async function decompress(b64){
  const bin=atob(b64),bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  const ds=new DecompressionStream('gzip'),w=ds.writable.getWriter();
  w.write(bytes);w.close();
  const out=[],r=ds.readable.getReader();
  while(true){const{done,value}=await r.read();if(done)break;out.push(value);}
  const tot=out.reduce((s,v)=>s+v.length,0),res=new Uint8Array(tot);
  let off=0;for(const v of out){res.set(v,off);off+=v.length;}
  return new TextDecoder().decode(res);
}

})();
function onSearch(){
  const q=(document.getElementById('q').value||'').trim();lastQ=q;
  if(q.length<2){document.getElementById('hint').style.display='flex';document.getElementById('scroll').style.display='none';return;}
  document.getElementById('hint').style.display='none';document.getElementById('scroll').style.display='block';
  renderResults(q);
}
function toggleSort(){sortAsc=!sortAsc;document.getElementById('sl').textContent=sortAsc?'Mnt ↑':'Mnt ↓';if(lastQ.length>=2)renderResults(lastQ);}
function renderResults(q){
  const ql=q.toLowerCase();
  let rows=DATA.filter(r=>(r.n||'').toLowerCase().includes(ql)||(r.s||'').includes(ql));
  rows.sort((a,b)=>sortAsc?a.m-b.m:b.m-a.m);
  document.getElementById('rc').textContent=rows.length+' société'+(rows.length!==1?'s':'');
  if(!rows.length){document.getElementById('cards').innerHTML='<div class="empty"><p>Aucun résultat</p><span>Essayez un autre nom ou SIREN</span></div>';return;}
  document.getElementById('cards').innerHTML=rows.slice(0,50).map(r=>{
    const cs=r.cs||[];
    const perio=cs.length?[...new Set(cs.map(c=>c.isTrim?'Trim.':'Mens.'))].join('/'):'';
    const durs=cs.length?[...new Set(cs.map(c=>c.dur).filter(Boolean))].sort((a,b)=>a-b).join(', '):'';
    const ref0=cs[0]?(cs[0].ref||''):'';
    const ref=ref0&&ref0!=='—'?ref0.split(' ').slice(0,3).join(' '):'';
    const meta=[perio,durs?durs+' mois':''].filter(Boolean).join(' · ');
    return '<div class="cc" onclick="openFiche(''+r.s+'')">'+
      '<div class="cc-hd"><div class="av">'+ini(r.n)+'</div>'+
      '<div class="ci"><div class="cn">'+r.n+'</div><div class="cs">SIREN '+r.s+' · '+cs.length+' contrat'+(cs.length>1?'s':'')+'</div></div>'+
      '<div class="cm"><div class="mn">'+f2(r.m)+' €</div>'+(meta?'<div class="mc">'+meta+'</div>':'')+'</div></div>'+
      '<div class="cc-ft">'+
        (durs?'<span class="pill" style="background:#EDE7F6;color:#4527A0">📅 '+durs+' mois</span>':'')+
        (ref?'<span class="pill" style="background:#FFF3E0;color:#e65100">🏦 '+ref+'</span>':'')+
        (r.sol>0?'<span class="pill" style="background:#E3F2FD;color:#0d47a1">💰 '+f2(r.sol)+' €/m</span>':'')+
      '</div></div>';
  }).join('')+(rows.length>50?'<div style="text-align:center;padding:16px;color:#888;font-size:12px">'+rows.length+' résultats — 50 affichés</div>':'');
}
function openFiche(siren){
  const r=DATA.find(d=>d.s===siren);if(!r)return;
  const cs=r.cs||[];
  document.getElementById('ft').textContent=r.n||'';
  document.getElementById('fs').textContent='SIREN '+r.s;
  document.getElementById('fb').innerHTML=
    '<div class="stats">'+
      '<div class="sbox2"><div class="n">'+cs.length+'</div><div class="l">Contrat'+(cs.length>1?'s':'')+'</div></div>'+
      '<div class="sbox2"><div class="n" style="font-size:15px">'+f2(r.m)+' €</div><div class="l">Mnt total financé</div></div>'+
    '</div>'+
    cs.map((c,i)=>{
      const dos=c.dos||'',lib=c.client||'',lm=c.lm||0,isTrim=c.isTrim,dur=c.dur||0,ech=c.ech||'—',mnt=c.mnt||0,solde=c.solde||0,ref=c.ref||'',bien=c.bien||'';
      const perio=isTrim?'Trimestrielle':'Mensuelle';
      const ll=f2(lm)+' €/mois · '+perio+(dur?' · '+dur+' mois':'');
      return '<div class="dc" id="dc'+i+'">'+
        '<div class="dhd"><span class="dn">N° '+dos+'</span><span class="dl" title="'+lib+'">'+lib+'</span></div>'+
        '<div class="dbody">'+
          '<div class="tags">'+
            (ref&&ref!=='—'?'<span class="tag" style="background:#FFF3E0;color:#e65100">🏦 '+ref+'</span>':'')+
            (bien?'<span class="tag" style="background:#FCE4EC;color:#880e4f">📦 '+bien+'</span>':'')+
          '</div>'+
          '<div class="fi"><span class="fk">Société</span><span class="fv">'+(r.n||'')+'</span></div>'+
          '<div class="fi"><span class="fk">Loyer</span><span class="fv">'+ll+'</span></div>'+
          '<div class="fi"><span class="fk">Fin de contrat</span><span class="fv">'+ech+'</span></div>'+
          '<div class="fi"><span class="fk">Montant financé</span><span class="fv">'+f2(mnt)+' €</span></div>'+
          '<div class="sb2"><div class="sl">Solde mensuel</div><div class="sv">'+f2(solde)+' €</div><div class="ss">sur 60 mois</div></div>'+
          '<button class="cbtn" onclick="cap('+i+')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copier la carte</button>'+

    }).join('');
  document.getElementById('fiche').classList.add('open');

}

async function cap(idx){
